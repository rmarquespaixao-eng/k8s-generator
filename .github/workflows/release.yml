name: Release (multiplataforma)

# Dispara ao empurrar uma tag vX.Y.Z. Builda NATIVO em runners do GitHub
# (Linux, Windows, macOS), publica cada um como artifact e um job final junta
# tudo num único GitHub Release — evita a corrida de 3 jobs escrevendo no mesmo
# release em paralelo.
#
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            builder: --linux
          - os: windows-latest
            builder: --win
          - os: macos-latest
            builder: --mac
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false" # sem assinatura de código
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Testes
        run: npm test

      - name: Bundle (electron-vite)
        run: npm run build

      - name: Empacota
        run: npx electron-builder ${{ matrix.builder }} --publish never

      - name: Publica artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe
            release/*.dmg
            release/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Baixa os artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Cria o GitHub Release com todos os instaladores
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.zip
          fail_on_unmatched_files: false
