name: Release (build multiplataforma + publica no Gitea)

# Disparo manual informando a versão (X.Y.Z). O job:
#   1) valida a versão e garante que a tag ainda não existe
#   2) roda os testes
#   3) ajusta a versão local (sem commit) p/ nomear os artefatos
#   4) empacota Linux (AppImage + deb) nativo e Windows (nsis via wine, best-effort)
#   5) cria o Release vX.Y.Z no commit atual do main e sobe os artefatos como assets
#
# macOS (.dmg): NÃO é gerado aqui — electron-builder não cross-compila p/ mac no Linux.
# Para incluir mac, registre um act_runner macOS e adicione um job `runs-on` nesse label.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão a lançar (ex: 1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # evita o electron-builder tentar assinar (não temos certificados)
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Meta (valida versão)
        id: meta
        env:
          IN: ${{ github.event.inputs.version }}
        run: |
          V="${IN#v}"; TAG="v${V}"
          echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "::error::versão inválida: $IN (use X.Y.Z)"; exit 1; }
          if git rev-parse "$TAG" >/dev/null 2>&1; then echo "::error::tag $TAG já existe"; exit 1; fi
          { echo "v=$V"; echo "tag=$TAG"; echo "sha=$(git rev-parse HEAD)"; } >> "$GITHUB_OUTPUT"
          echo ">> lançando v${V} no commit $(git rev-parse --short HEAD)"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Testes
        run: npm test

      - name: Versão dos artefatos (sem commit)
        run: npm version "${{ steps.meta.outputs.v }}" --no-git-tag-version --allow-same-version

      - name: Dependências de empacotamento Windows (wine, best-effort)
        run: |
          sudo dpkg --add-architecture i386 || true
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends wine64 wine32 || sudo apt-get install -y --no-install-recommends wine || true

      - name: Bundle (electron-vite)
        run: npm run build

      - name: Empacota Linux (AppImage + deb)
        run: npx electron-builder --linux --publish never

      - name: Empacota Windows (nsis via wine, best-effort)
        continue-on-error: true
        run: npx electron-builder --win --publish never

      - name: Lista artefatos
        run: ls -lh release || true

      - name: Cria Release no Gitea
        id: rel
        env:
          TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.meta.outputs.tag }}
          SHA: ${{ steps.meta.outputs.sha }}
          V: ${{ steps.meta.outputs.v }}
        run: |
          CHANGELOG=$(git log --no-merges --format='- %s (%h)' -n 30 || true)
          [ -n "$CHANGELOG" ] || CHANGELOG="- release ${V}"
          ID=$(jq -n --arg t "$TAG" --arg c "$SHA" --arg b "$CHANGELOG" \
                '{tag_name:$t, target_commitish:$c, name:$t, body:$b, draft:false, prerelease:false}' \
              | curl -fsS -X POST "http://gitea:3000/api/v1/repos/${REPO}/releases" \
                  -H "Authorization: token ${TOKEN}" -H "Content-Type: application/json" --data @- \
              | jq -r '.id')
          [ -n "$ID" ] && [ "$ID" != "null" ] || { echo "::error::falha ao criar release"; exit 1; }
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo ">> Release ${TAG} criado (id ${ID})"

      - name: Sobe os artefatos como assets
        env:
          TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
          REPO: ${{ github.repository }}
          ID: ${{ steps.rel.outputs.id }}
        run: |
          shopt -s nullglob
          count=0
          for f in release/*.AppImage release/*.deb release/*.exe; do
            echo ">> upload $(basename "$f")"
            curl -fsS -X POST \
              "http://gitea:3000/api/v1/repos/${REPO}/releases/${ID}/assets?name=$(basename "$f")" \
              -H "Authorization: token ${TOKEN}" \
              -F "attachment=@${f}" >/dev/null
            count=$((count + 1))
          done
          echo "✓ ${count} asset(s) enviados ao release ${{ steps.meta.outputs.tag }}"
