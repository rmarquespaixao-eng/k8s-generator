name: Release (matriz nativa Linux + Windows -> publica no Gitea)

# Disparo manual informando a versão (X.Y.Z). Estágios:
#   meta     (linux) valida versão / tag, resolve o commit
#   build    (matriz ubuntu + windows) empacota NATIVO e publica como artifact
#   publish  (linux) baixa os artifacts, cria o Release vX.Y.Z e sobe os assets
#
# Só o runner Linux fala com a API do Gitea (http://gitea:3000) — o runner Windows
# apenas produz o .exe e entrega via artifact. macOS não é alvo (sem runner mac).
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Versão a lançar (ex: 1.2.3)"
        required: true

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      v: ${{ steps.m.outputs.v }}
      tag: ${{ steps.m.outputs.tag }}
      sha: ${{ steps.m.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
      - name: Valida versão
        id: m
        env:
          IN: ${{ github.event.inputs.version }}
        run: |
          V="${IN#v}"; TAG="v${V}"
          echo "$V" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "::error::versão inválida: $IN (use X.Y.Z)"; exit 1; }
          if git rev-parse "$TAG" >/dev/null 2>&1; then echo "::error::tag $TAG já existe"; exit 1; fi
          { echo "v=$V"; echo "tag=$TAG"; echo "sha=$(git rev-parse HEAD)"; } >> "$GITHUB_OUTPUT"
          echo ">> lançando v${V} no commit $(git rev-parse --short HEAD)"

  build:
    needs: meta
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            builder: --linux
            artifact: dist-linux
          - os: windows-latest
            platform: windows
            builder: --win
            artifact: dist-windows
    runs-on: ${{ matrix.os }}
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false" # sem assinatura de código
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Testes
        run: npm test

      - name: Versão dos artefatos (sem commit)
        run: npm version "${{ needs.meta.outputs.v }}" --no-git-tag-version --allow-same-version

      - name: Bundle (electron-vite)
        run: npm run build

      - name: Empacota (${{ matrix.platform }})
        run: npx electron-builder ${{ matrix.builder }} --publish never

      - name: Publica artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          path: |
            release/*.AppImage
            release/*.deb
            release/*.exe

  publish:
    needs: [meta, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Baixa os artifacts dos builds
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Cria Release no Gitea
        id: rel
        env:
          TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.meta.outputs.tag }}
          SHA: ${{ needs.meta.outputs.sha }}
          V: ${{ needs.meta.outputs.v }}
        run: |
          CHANGELOG=$(git log --no-merges --format='- %s (%h)' -n 30 || true)
          [ -n "$CHANGELOG" ] || CHANGELOG="- release ${V}"
          ID=$(jq -n --arg t "$TAG" --arg c "$SHA" --arg b "$CHANGELOG" \
                '{tag_name:$t, target_commitish:$c, name:$t, body:$b, draft:false, prerelease:false}' \
              | curl -fsS -X POST "http://gitea:3000/api/v1/repos/${REPO}/releases" \
                  -H "Authorization: token ${TOKEN}" -H "Content-Type: application/json" --data @- \
              | jq -r '.id')
          [ -n "$ID" ] && [ "$ID" != "null" ] || { echo "::error::falha ao criar release"; exit 1; }
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo ">> Release ${TAG} criado (id ${ID})"

      - name: Sobe os artefatos como assets
        env:
          TOKEN: ${{ secrets.CI_PUSH_TOKEN }}
          REPO: ${{ github.repository }}
          ID: ${{ steps.rel.outputs.id }}
        run: |
          count=0
          while IFS= read -r f; do
            echo ">> upload $(basename "$f")"
            curl -fsS -X POST \
              "http://gitea:3000/api/v1/repos/${REPO}/releases/${ID}/assets?name=$(basename "$f")" \
              -H "Authorization: token ${TOKEN}" \
              -F "attachment=@${f}" >/dev/null
            count=$((count + 1))
          done < <(find dist -type f \( -name '*.AppImage' -o -name '*.deb' -o -name '*.exe' \))
          [ "$count" -gt 0 ] || { echo "::error::nenhum artefato encontrado"; exit 1; }
          echo "✓ ${count} asset(s) enviados ao release ${{ needs.meta.outputs.tag }}"
